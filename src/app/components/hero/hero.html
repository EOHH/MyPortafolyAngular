<section id="hero" class="hero-section">
  <div class="hero-content-wrapper">
    <!-- Contenido Izquierdo: Tu información y CTAs (con fondo blanco) -->
    <div class="hero-left-content">
      <div class="hero-text-block">
        <p class="greeting">¡Hola, soy!</p>
        <h1 class="hero-name"><span>{{ name }}</span>.</h1>
        <p class="hero-title">{{ title }}</p>
        <p class="hero-tagline">{{ tagline }}</p>

        <div class="hero-actions">
          <a href="#portfolio" class="btn-primary" (click)="viewProjects()">
            Ver Mis Proyectos
          </a>
          <a href="/assets/pdf/CV_Edilson_Huaman_2025.pdf" download class="btn-secondary" (click)="downloadCV()">
            Descargar CV
          </a>
        </div>
      </div>
    </div>

    <!-- Contenido Derecho: Tu imagen de perfil (con fondo rojizo-anaranjado) -->
    <div class="hero-right-image">
      <img [src]="profileImageUrl" alt="Edilson Huaman - Desarrollador de Software" class="profile-image" loading="lazy">
    </div>
  </div>

  <!-- Barra lateral de Redes Sociales (posición ajustada al nuevo diseño) -->
  <div class="hero-social-sidebar">
    <a *ngFor="let link of socialLinks" [href]="link.url" target="_blank" [attr.aria-label]="'Visitar mi ' + link.name">
      <fa-icon [icon]="link.icon"></fa-icon>
    </a>
  </div>
</section>
