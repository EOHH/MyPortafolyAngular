<section id="hero" class="hero-section">
  <div class="hero-content-wrapper">

    <!-- Lado izquierdo: texto, botones e íconos sociales en móvil -->
    <div class="hero-left-content">
      <div class="hero-text-block">
        <p class="greeting">¡Hola, soy!</p>
        <h1 class="hero-name"><span>{{ name }}</span>.</h1>
        <p class="hero-title">{{ title }}</p>
        <p class="hero-tagline">{{ tagline }}</p>

        <div class="hero-actions">
          <a href="#portfolio" class="btn-primary" (click)="viewProjects()">
            Ver Mis Proyectos
          </a>
          <a href="/assets/pdf/CV_Edilson_Huaman_2025.pdf" download class="btn-secondary" (click)="downloadCV()">
            Descargar CV
          </a>
        </div>

        <!--
          Íconos sociales para MÓVIL — dentro del flujo normal del DOM.
          En desktop se ocultan con display:none y se usan los del sidebar.
        -->
        <div class="hero-social-mobile">
          <a *ngFor="let link of socialLinks"
             [href]="link.url"
             target="_blank"
             [attr.aria-label]="'Visitar mi ' + link.name">
            <fa-icon [icon]="link.icon"></fa-icon>
          </a>
        </div>
      </div>
    </div>

    <!-- Lado derecho: imagen de perfil -->
    <div class="hero-right-image">
      <img [src]="profileImageUrl"
           alt="Edilson Huaman - Desarrollador de Software"
           class="profile-image"
           loading="lazy">
    </div>
  </div>

  <!--
    Íconos sociales para DESKTOP — posición absoluta en el lado izquierdo.
    En móvil se ocultan con display:none.
  -->
  <div class="hero-social-sidebar">
    <a *ngFor="let link of socialLinks"
       [href]="link.url"
       target="_blank"
       [attr.aria-label]="'Visitar mi ' + link.name">
      <fa-icon [icon]="link.icon"></fa-icon>
    </a>
  </div>
</section>
