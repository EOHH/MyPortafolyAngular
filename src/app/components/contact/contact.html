<section id="contact" class="contact-section">
  <div class="container">
    <div class="section-header">
      <h2>{{ sectionHeader.title }}</h2>
      <p>{{ sectionHeader.subtitle }}</p>
    </div>

    <div class="contact-content-wrapper">
      <!-- Columna de Información de Contacto -->
      <div class="contact-info">
        <div class="info-item">
          <fa-icon [icon]="['fas', 'map-marker-alt']" class="info-icon"></fa-icon>
          <div class="info-details">
            <h4>Ubicación:</h4>
            <p>{{ contactInfo.location }}</p>
          </div>
        </div>
        <div class="info-item">
          <fa-icon [icon]="['fas', 'phone']" class="info-icon"></fa-icon>
          <div class="info-details">
            <h4>Teléfono:</h4>
            <p><a [href]="'tel:' + contactInfo.phone">{{ contactInfo.phone }}</a></p>
          </div>
        </div>
        <div class="info-item">
          <fa-icon [icon]="['fas', 'envelope']" class="info-icon"></fa-icon>
          <div class="info-details">
            <h4>Email:</h4>
            <p><a [href]="'mailto:' + contactInfo.email">{{ contactInfo.email }}</a></p>
          </div>
        </div>

        <div class="social-links-contact">
          <h4>Mis Redes Sociales:</h4>
          <div class="social-icons">
            <a *ngFor="let link of socialLinks" [href]="link.url" target="_blank" [attr.aria-label]="'Visitar mi ' + link.name">
              <fa-icon [icon]="link.icon"></fa-icon>
            </a>
          </div>
        </div>
      </div>

      <!-- Columna del Formulario de Contacto -->
      <div class="contact-form-wrapper">
        <form (ngSubmit)="onSubmit()" #contactFormRef="ngForm" class="contact-form">
          <div class="form-group">
            <label for="name">Tu Nombre</label>
            <div class="input-with-icon">
              <fa-icon [icon]="['fas', 'user']"></fa-icon>
              <input type="text" id="name" name="name" [(ngModel)]="contactForm.name" required placeholder="Ej: Edilson Huaman">
            </div>
          </div>
          <div class="form-group">
            <label for="email">Tu Email</label>
            <div class="input-with-icon">
              <fa-icon [icon]="['fas', 'envelope']"></fa-icon>
              <input type="email" id="email" name="email" [(ngModel)]="contactForm.email" required email placeholder="Ej: tu.email@example.com">
            </div>
          </div>
          <div class="form-group">
            <label for="subject">Asunto</label>
            <div class="input-with-icon">
              <fa-icon [icon]="['fas', 'tag']"></fa-icon>
              <input type="text" id="subject" name="subject" [(ngModel)]="contactForm.subject" required placeholder="Ej: Consulta de proyecto web">
            </div>
          </div>
          <div class="form-group">
            <label for="message">Mensaje</label>
            <textarea id="message" name="message" [(ngModel)]="contactForm.message" rows="6" required placeholder="Escribe tu mensaje aquí..."></textarea>
          </div>
          <button type="submit" class="btn-primary contact-submit-btn">
            <fa-icon [icon]="['fas', 'paper-plane']"></fa-icon> Enviar Mensaje
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
